 {id:0,icon:'🐚',title:'What is a Shell?',level:'beginner',xp:20,

 {id:2,icon:'📝',title:'Your First Script',level:'beginner',xp:30,

 {id:3,icon:'📦',title:'Variables',level:'beginner',xp:35,
  desc:'Variables store data. Critical rules: NO spaces around =. Use $ to read. Double quotes expand variables. Single quotes are completely literal.',

 {id:4,icon:'🔀',title:'Conditionals',level:'beginner',xp:40,

 {id:6,icon:'🔧',title:'Functions',level:'intermediate',xp:45,

 {id:7,icon:'📋',title:'Arrays',level:'intermediate',xp:45,

 {id:9,icon:'🛡️',title:'Error Handling',level:'intermediate',xp:50,
  desc:'Every command returns an exit code: 0 = success. $? holds the last exit code. set -euo pipefail makes your script fail fast instead of silently producing wrong results.',
  ex:[

 {id:10,icon:'⚡',title:'Process Management',level:'advanced',xp:55,
  desc:'& runs jobs in background. $$ is this process PID. $! is last background PID. wait waits for all jobs. trap catches signals for guaranteed cleanup.',

 {id:11,icon:'☁️',title:'Azure CLI + Bash',level:'advanced',xp:65,

 {id:12,icon:'🏗️',title:'Production Deploy Script',level:'advanced',xp:80,
  desc:'Everything combined: set -euo pipefail, functions, trap, timestamped logging, argument validation, Azure CLI. This is how real production scripts look.',
  ex:[
   {l:'Safe header (mandatory)',   c:'echo "#!/bin/bash"; echo "set -euo pipefail"',               n:'NEVER skip this in production'},
   {l:'Timestamped logger',       c:'log() { echo "[$(date +%T)] $*"; }; log "Deploy started"',   n:'all output should be timestamped'},
   {l:'Validate argument',        c:'[[ "staging" =~ ^(staging|production)$ ]] && echo "Valid!" || echo "INVALID!"', n:'validate BEFORE doing anything'},
   {l:'Run the deploy script',    c:'./deploy.sh',                n:'see it all in action!'},
  ],
  ch:{q:"In 'set -euo pipefail', what does the 'e' flag specifically do?",a:['exit on error','exit immediately','exits when command fails','exit on any error'],h:'e = exit. Script halts when any command returns non-zero exit code.'}},

var TOTAL_XP=LESSONS.reduce(function(s,l){return s+l.xp;},0);

/* ═══════════════════════════════════════════════════════════
   TERMINAL ENGINE
═══════════════════════════════════════════════════════════ */
var VFILES={
  'hello.sh':   '#!/bin/bash\necho "Hello, World!"',
  'data.txt':   'Alice 30 London\nBob 25 Paris\nCarol 35 Tokyo\nDave 28 Berlin',
  'numbers.txt':'42\n7\n19\n3\n88\n15',
  'greet.sh':   '#!/bin/bash\nname=$1\necho "Hello, $name! Welcome to bash."',
  'deploy.sh':  '#!/bin/bash\nset -euo pipefail\nlog() { echo "[$(date +%T)] $*"; }\nlog "Starting deploy..."\nlog "Done!"',
};

function expandVars(s,env){
  return String(s).replace(/\$\{([^}]+)\}|\$([A-Za-z_]\w*)/g,function(_,a,b){
    var k=a!=null?a:b; return env[k]!=null?String(env[k]):'';
  });
}

function evalCond(raw,env){
  var c=expandVars(raw.trim(),env).trim(), m;
  m=c.match(/^-f\s+"?([^"]+)"?$/);
  if(m) return ['hello.sh','data.txt','numbers.txt','greet.sh','deploy.sh'].indexOf(m[1])>=0;
  m=c.match(/^-z\s+"?([^"]*)"?$/); if(m) return m[1]==='';
  m=c.match(/^-n\s+"?([^"]*)"?$/); if(m) return m[1]!=='';
  m=c.match(/^(-?\d+)\s+(-eq|-ne|-lt|-gt|-le|-ge)\s+(-?\d+)$/);
  if(m){var na=parseInt(m[1]),nb=parseInt(m[3]);
    return m[2]==='-eq'?na===nb:m[2]==='-ne'?na!==nb:m[2]==='-lt'?na<nb:m[2]==='-gt'?na>nb:m[2]==='-le'?na<=nb:na>=nb;}
  m=c.match(/^"?([^"]*)"?\s*(==|!=)\s*"?([^"]*)"?$/);
  if(m) return m[2]==='=='?m[1]===m[3]:m[1]!==m[3];
  try{m=c.match(/^"?([^"]*)"?\s*=~\s*(.+)$/);if(m) return new RegExp(m[2]).test(m[1]);}catch(e){}
  return false;
}

function runCmd(raw,env,cwd,fs){
  var t=raw.trim();
  if(!t) return {out:null,ok:true,env:env,cwd:cwd,fs:fs};
  var m,r,i,items,outs,curEnv,nfs,content,lines,hits;

  m=t.match(/^\[\[(.+?)\]\]\s*&&\s*(.+?)(?:\s*\|\|\s*(.+))?$/);
  if(m){
    if(evalCond(m[1],env)) return runCmd(m[2].trim(),env,cwd,fs);
    if(m[3]) return runCmd(m[3].trim(),env,cwd,fs);
    return {out:null,ok:false,env:env,cwd:cwd,fs:fs};
  }

  m=t.match(/^for\s+(\w+)\s+in\s+(.+?);\s*do\s+(.+?);\s*done$/);
  if(m){
    items=[];
    var rng=m[2].trim().match(/^\{(\d+)\.\.(\d+)\}$/);
    if(rng){for(i=parseInt(rng[1]);i<=parseInt(rng[2]);i++) items.push(String(i));}
    else items=m[2].trim().split(/\s+/).map(function(x){return x.replace(/["']/g,'');});
    outs=[];curEnv=env;
    for(i=0;i<items.length;i++){curEnv=Object.assign({},curEnv);curEnv[m[1]]=items[i];r=runCmd(m[3].trim(),curEnv,cwd,fs);if(r.out!=null)outs.push(r.out);}
    return {out:outs.length?outs.join('\n'):null,ok:true,env:env,cwd:cwd,fs:fs};
  }

  if(/^[A-Za-z_]\w*=/.test(t)&&t[0]!=='['){
    var eq=t.indexOf('='),key=t.slice(0,eq);
    var val=t.slice(eq+1).replace(/^(["'])(.*)\1$/,'$2');
    val=expandVars(val,env);
    var ne=Object.assign({},env);ne[key]=val;
    return {out:null,ok:true,env:ne,cwd:cwd,fs:fs};
  }

  var ex2=t.replace(/\$\(([^)]+)\)/g,function(_,inner){r=runCmd(inner.trim(),env,cwd,fs);return r.out||'';});
  var tok=ex2.match(/(?:[^\s"']+|"[^"]*"|'[^']*')+/g)||[];
  var prog=tok[0]||'';
  var args=tok.slice(1).map(function(p){return p.replace(/^(["'])(.*)\1$/,'$2');});
  var arg0=expandVars(args[0]||'',env);

  switch(prog){
    case 'echo':{var r2=tok.slice(1).join(' ').replace(/^(["'])(.*)\1$/,'$2');return {out:expandVars(r2,env),ok:true,env:env,cwd:cwd,fs:fs};}
    case 'pwd':    return {out:cwd,ok:true,env:env,cwd:cwd,fs:fs};
    case 'whoami': return {out:'student',ok:true,env:env,cwd:cwd,fs:fs};
    case 'date':   return {out:new Date().toString().slice(0,24),ok:true,env:env,cwd:cwd,fs:fs};
    case 'clear':  return {out:'__CLEAR__',ok:true,env:env,cwd:cwd,fs:fs};
    case 'hostname':return{out:'shell-academy',ok:true,env:env,cwd:cwd,fs:fs};
    case 'bash':   return {out:args[0]==='--version'?'GNU bash, version 5.2.15(1)-release':'Use: bash --version',ok:true,env:env,cwd:cwd,fs:fs};
    case 'which':  return {out:'/usr/bin/'+arg0,ok:true,env:env,cwd:cwd,fs:fs};
    case 'ps':     return {out:'  PID TTY       TIME CMD\n 1234 pts/0 00:00:01 bash\n 5678 pts/0 00:00:00 ps',ok:true,env:env,cwd:cwd,fs:fs};
    case 'sleep':  return {out:'(sleep '+arg0+'s — no wait in simulator)',ok:true,env:env,cwd:cwd,fs:fs};
    case 'export': return {out:null,ok:true,env:env,cwd:cwd,fs:fs};
    case 'set':    return {out:'(set: shell options — e.g. set -euo pipefail)',ok:true,env:env,cwd:cwd,fs:fs};
    case 'tr':     return {out:'(tr: translate chars — try in your real terminal)',ok:true,env:env,cwd:cwd,fs:fs};
    case 'sed':    return {out:'(sed: stream editor — try in your real terminal)',ok:true,env:env,cwd:cwd,fs:fs};
    case 'awk':    return {out:'(awk: text processor — try in your real terminal)',ok:true,env:env,cwd:cwd,fs:fs};
    case 'az':     return {out:'Azure CLI — install: https://aka.ms/InstallAzureCLIDeb\nThen: az login  →  az account show',ok:true,env:env,cwd:cwd,fs:fs};
    case 'env':case 'printenv':return{out:Object.keys(env).map(function(k){return k+'='+env[k];}).join('\n'),ok:true,env:env,cwd:cwd,fs:fs};
    case 'find':   return {out:'./hello.sh\n./data.txt\n./numbers.txt\n./greet.sh\n./deploy.sh',ok:true,env:env,cwd:cwd,fs:fs};
    case 'help':case '?':return{out:
      'Commands: echo  pwd  ls  cd  mkdir  touch  cat  grep  sort  wc  head  tail  chmod  clear\n'+
      'Vars:     name=Alice  →  echo $name\n'+
      'Loops:    for i in {1..5}; do echo $i; done\n'+
      'Conds:    [[ 5 -gt 3 ]] && echo yes || echo no\n'+
      'Pipes:    cat data.txt | grep Alice\n'+
      'Files:    hello.sh  data.txt  numbers.txt  greet.sh  deploy.sh',
      ok:true,env:env,cwd:cwd,fs:fs};
    case 'ls':{
      var base=Object.keys(VFILES),extra=fs[cwd]||[];
      var all=cwd==='/home/student'?base.concat(extra.filter(function(f){return base.indexOf(f)<0;})):extra;
      return {out:all.length?all.join('  '):'(empty directory)',ok:true,env:env,cwd:cwd,fs:fs};
    }
    case 'cd':{var tgt=arg0||'~';var nc=(tgt==='~'||!tgt)?'/home/student':tgt.startsWith('/')?tgt:cwd+'/'+tgt;return{out:null,ok:true,env:env,cwd:nc,fs:fs};}
    case 'mkdir':{if(!arg0)return{out:'mkdir: missing operand',ok:false,env:env,cwd:cwd,fs:fs};nfs=Object.assign({},fs);nfs[cwd]=(nfs[cwd]||[]).concat([arg0+'/']);return{out:null,ok:true,env:env,cwd:cwd,fs:nfs};}
    case 'touch':{if(!arg0)return{out:'touch: missing file operand',ok:false,env:env,cwd:cwd,fs:fs};nfs=Object.assign({},fs);nfs[cwd]=(nfs[cwd]||[]).concat([arg0]);return{out:null,ok:true,env:env,cwd:cwd,fs:nfs};}
    case 'rm':{nfs=Object.assign({},fs);nfs[cwd]=(nfs[cwd]||[]).filter(function(f){return f!==arg0;});return{out:null,ok:true,env:env,cwd:cwd,fs:nfs};}
    case 'cat':{if(!arg0)return{out:'cat: missing file operand',ok:false,env:env,cwd:cwd,fs:fs};content=VFILES[arg0];if(content!=null)return{out:content,ok:true,env:env,cwd:cwd,fs:fs};return{out:'cat: '+arg0+': No such file or directory',ok:false,env:env,cwd:cwd,fs:fs};}
    case 'chmod':return{out:'Permissions updated: -rwxr-xr-x '+(args[args.length-1]||''),ok:true,env:env,cwd:cwd,fs:fs};
    case 'grep':{
      var dI=args.indexOf('-i')>=0,dN=args.indexOf('-n')>=0;
      var fa=args.filter(function(a){return !a.startsWith('-');}),pat=fa[0]||'',gf=fa[1]||'';
      content=VFILES[gf]||'';
      if(!content&&gf)return{out:'grep: '+gf+': No such file',ok:false,env:env,cwd:cwd,fs:fs};
      lines=content.split('\n');hits=[];
      for(i=0;i<lines.length;i++){var mt=dI?lines[i].toLowerCase().includes(pat.toLowerCase()):lines[i].includes(pat);if(mt)hits.push(dN?(i+1)+':'+lines[i]:lines[i]);}
      return{out:hits.length?hits.join('\n'):'(no matches)',ok:hits.length>0,env:env,cwd:cwd,fs:fs};
    }
    case 'sort':{content=VFILES[arg0]||'';if(!content&&arg0)return{out:'sort: '+arg0+': No such file',ok:false,env:env,cwd:cwd,fs:fs};lines=content.split('\n').filter(Boolean);var num=lines.every(function(l){return !isNaN(Number(l));});return{out:(num?lines.slice().sort(function(a,b){return Number(a)-Number(b);}):lines.slice().sort()).join('\n'),ok:true,env:env,cwd:cwd,fs:fs};}
    case 'wc':{content=VFILES[arg0]||'';if(!content&&arg0)return{out:'wc: '+arg0+': No such file',ok:false,env:env,cwd:cwd,fs:fs};return{out:'  '+content.split('\n').length+'  '+content.trim().split(/\s+/).length+'  '+content.length+' '+arg0,ok:true,env:env,cwd:cwd,fs:fs};}
    case 'head':{var hn=args.indexOf('-n')>=0?parseInt(args[args.indexOf('-n')+1]||'3'):3;var hf=args.filter(function(a){return !a.startsWith('-');}).pop()||'';return{out:(VFILES[hf]||'').split('\n').slice(0,hn).join('\n'),ok:true,env:env,cwd:cwd,fs:fs};}
    case 'tail':{var tf=args.filter(function(a){return !a.startsWith('-');}).pop()||'';return{out:(VFILES[tf]||'').split('\n').slice(-3).join('\n'),ok:true,env:env,cwd:cwd,fs:fs};}
    case 'uniq':{lines=(VFILES[arg0]||'').split('\n');return{out:lines.filter(function(l,idx){return idx===0||l!==lines[idx-1];}).join('\n'),ok:true,env:env,cwd:cwd,fs:fs};}
    default:
      if(prog.startsWith('./')&&prog.endsWith('.sh')){
        var sn=prog.slice(2);
        if(sn==='greet.sh')return{out:'Hello, '+(args[0]||'stranger')+'! Welcome to bash.',ok:true,env:env,cwd:cwd,fs:fs};

      }

      return{out:"bash: "+prog+": command not found\nType 'help' for available commands",ok:false,env:env,cwd:cwd,fs:fs};
  }
}

function exec(raw){
  var trimmed=(raw||'').trim();
  if(!trimmed)return;
  S.tHist.unshift(trimmed);
  if(S.tHist.length>200)S.tHist.pop();
  S.tHIdx=-1;
  var prompt=(S.tCwd==='/home/student'?'~':S.tCwd)+' $ '+trimmed;
  var isCompound=/\b(for|while|until|if)\b/.test(trimmed)&&/\b(do|then)\b/.test(trimmed);
  S.tLines.push({k:'cmd',v:prompt});
  if(isCompound){
    var r=runCmd(trimmed,S.tEnv,S.tCwd,S.tFs);
    S.tEnv=r.env;S.tCwd=r.cwd;S.tFs=r.fs;
    if(r.out==='__CLEAR__')S.tLines=[{k:'tip',v:'(terminal cleared)'}];
    else if(r.out!=null)S.tLines.push({k:r.ok?'out':'err',v:r.out});
    render();return;
  }
  var stmts=trimmed.split(/;\s*/);
  var env=S.tEnv,cwd=S.tCwd,fs=S.tFs;
  for(var si=0;si<stmts.length;si++){
    var stmt=stmts[si].trim();if(!stmt)continue;
    if(stmt.includes(' | ')){
      var parts=stmt.split(/\s*\|\s*/),lastOut=null,lastOk=true;
      for(var pi=0;pi<parts.length;pi++){var r2=runCmd(parts[pi].trim(),env,cwd,fs);env=r2.env;cwd=r2.cwd;fs=r2.fs;if(r2.out!=null){lastOut=r2.out;lastOk=r2.ok;}}
      if(lastOut!=null)S.tLines.push({k:lastOk?'out':'err',v:lastOut});
    }else{
      var r3=runCmd(stmt,env,cwd,fs);env=r3.env;cwd=r3.cwd;fs=r3.fs;
      if(r3.out==='__CLEAR__')S.tLines=[{k:'tip',v:'(terminal cleared)'}];
      else if(r3.out!=null)S.tLines.push({k:r3.ok?'out':'err',v:r3.out});
    }
  }
  S.tEnv=env;S.tCwd=cwd;S.tFs=fs;render();
}

  else if(e.key==='Tab'){e.preventDefault();}
  else{S.tIn=e.target.value;}
}

      '<textarea id="cfa'+l.id+'" rows="2" placeholder="Type your answer here…" oninput="updateCfa('+l.id+',this.value)" style="width:100%;background:#040608;border:1px solid '+BORDER+';border-radius:8px;padding:10px 12px;font-family:'+MONO+';font-size:13px;color:'+TEXT+';resize:vertical;box-sizing:border-box"></textarea>'+
      '<div style="display:flex;gap:10px;margin-top:10px">'+
        '<button onclick="checkC('+l.id+')" style="background:'+GRN+';color:#fff;border:none;border-radius:8px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer">Submit Answer</button>'+
        '<button onclick="hintC('+l.id+')" style="background:transparent;border:1px solid '+BORDER+';border-radius:8px;padding:9px 16px;font-size:13px;color:'+DIM+';cursor:pointer">💡 Hint</button>'+
      '</div>'+fbHtml+'</div></div>';

  var nav2='<div style="display:flex;gap:10px">';
  if(S.lid>0)nav2+='<button onclick="goLesson('+(S.lid-1)+')" style="background:'+PANEL+';border:1px solid '+BORDER+';border-radius:8px;padding:9px 18px;font-size:13px;color:'+DIM+';cursor:pointer">← Previous</button>';
  if(S.lid<LESSONS.length-1)nav2+='<button onclick="goLesson('+(S.lid+1)+')" style="background:'+GRN+';color:#fff;border:none;border-radius:8px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer">Next Lesson →</button>';
  else nav2+='<span style="color:'+GRN+';font-weight:700;font-size:14px;align-self:center">🎉 All lessons done — you are a shell master!</span>';
  nav2+='</div>';

  return miniNav+head+desc2+exBox+challenge+nav2;
}

function renderTerminal(){
  var cwd=S.tCwd==='/home/student'?'~':S.tCwd;
  var lines=S.tLines.map(function(line){
    var col=line.k==='cmd'?GRN:line.k==='hdr'?'#a78bfa':line.k==='tip'?TIP:line.k==='err'?'#f87171':TEXT;
    return '<div style="white-space:pre-wrap;line-height:1.8;color:'+col+'">'+esc(line.v)+'</div>';
  }).join('');

  var term='<div style="background:#040608;border:1px solid '+BORDER+';border-radius:14px;overflow:hidden;margin-bottom:20px">'+
    '<div style="background:'+P2+';padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid '+BORDER+'">'+
      trafficLights()+
      '<span style="font-family:'+MONO+';font-size:11px;color:'+TIP+';margin-left:6px">bash — student@shell-academy:'+cwd+'</span>'+
      '<button onclick="resetTerm()" style="margin-left:auto;background:none;border:1px solid '+BORDER+';border-radius:5px;color:'+DIM+';font-size:10px;padding:2px 8px;cursor:pointer">reset</button>'+
    '</div>'+
    '<div id="tOut" style="padding:12px 16px;min-height:300px;max-height:420px;overflow-y:auto;font-family:'+MONO+';font-size:13px;line-height:1.7">'+lines+'</div>'+
    '<div style="display:flex;align-items:center;padding:10px 16px;border-top:1px solid '+BORDER+';background:'+P2+';gap:8px">'+
      '<span style="font-family:'+MONO+';font-size:13px;color:'+GRN+';flex-shrink:0;white-space:nowrap">'+cwd+' $</span>'+
      '<input id="ti" onkeydown="termKey(event)" oninput="S.tIn=this.value" placeholder="type a command and press Enter…" style="flex:1;background:none;border:none;font-family:'+MONO+';font-size:13px;color:'+TEXT+'"/>'+
      '<button onclick="execBtn()" style="background:'+GRN+';color:#fff;border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer">Run ↵</button>'+
    '</div></div>';

  var QUICK=['echo "Hello, World!"','pwd','ls','whoami','cat data.txt','grep Alice data.txt','grep -i bob data.txt','sort numbers.txt','wc data.txt','chmod +x hello.sh; ./hello.sh','for i in {1..3}; do echo $i; done','./greet.sh Alice','./deploy.sh','cat data.txt | grep Bob'];
  var qBtns='<div style="margin-bottom:20px"><div style="font-size:11px;color:'+DIM+';font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Quick commands — click to load</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
  QUICK.forEach(function(cmd){var idx=CBUF.length;CBUF.push(cmd);qBtns+='<button onclick="loadCmd('+idx+')" style="background:'+PANEL+';border:1px solid '+BORDER+';border-radius:8px;padding:5px 10px;font-size:11px;color:'+TIP+';cursor:pointer;font-family:'+MONO+'">'+esc(cmd)+'</button>';});
  qBtns+='</div></div>';

  var EX=[
    {n:1,t:'Print "Hello World"',                    c:'echo "Hello World"'},
    {n:2,t:'Set city=Tokyo and print it',             c:'city="Tokyo"; echo "City: $city"'},
    {n:3,t:'Create a folder called workspace',        c:'mkdir workspace'},
    {n:4,t:'View contents of data.txt',               c:'cat data.txt'},
    {n:5,t:'Find lines with Bob in data.txt',         c:'grep Bob data.txt'},
    {n:6,t:'Sort numbers.txt numerically',            c:'sort numbers.txt'},
    {n:7,t:'Count lines/words/chars in data.txt',     c:'wc data.txt'},
    {n:8,t:'Make hello.sh executable and run it',     c:'chmod +x hello.sh; ./hello.sh'},
    {n:9,t:'Loop: print 1 to 5',                     c:'for i in {1..5}; do echo $i; done'},
    {n:10,t:'Loop over fruits and print each',        c:'for f in apple banana cherry; do echo $f; done'},
    {n:11,t:'Test: is 10 greater than 5?',            c:"[[ 10 -gt 5 ]] && echo 'yes 10>5' || echo 'no'"},
    {n:12,t:'Greet yourself by name',                 c:'./greet.sh YourName'},
    {n:13,t:'Run the deploy script',                  c:'./deploy.sh'},
    {n:14,t:'Pipe: filter data.txt to Carol only',    c:'cat data.txt | grep Carol'},
  ];
  var exHtml='<div><div style="font-size:11px;color:'+DIM+';font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">Hands-on exercises — 14 challenges</div><div style="display:grid;gap:7px">';
  EX.forEach(function(ex){
    var idx=CBUF.length;CBUF.push(ex.c);
    exHtml+='<div style="background:'+PANEL+';border:1px solid '+BORDER+';border-radius:10px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;gap:12px">'+
      '<div style="display:flex;align-items:center;gap:10px">'+
        '<span style="color:'+GRN+';font-weight:700;font-size:12px;font-family:'+MONO+';flex-shrink:0;width:22px">'+ex.n+'.</span>'+
        '<span style="font-size:13px;color:#7a9bbf">'+esc(ex.t)+'</span>'+
      '</div>'+
      '<button onclick="loadCmd('+idx+')" style="background:rgba(34,197,94,.1);color:'+GRN+';border:1px solid rgba(34,197,94,.2);border-radius:7px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0">Load</button>'+
    '</div>';
  });
  exHtml+='</div></div>';
  return term+qBtns+exHtml;
}

      '<div style="width:32px;height:32px;background:'+GRN+';border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0">AI</div>'+
      '<div><div style="font-size:14px;font-weight:700">Shell Scripting Tutor</div><div style="font-size:11px;color:'+DIM+'">powered by Claude · '+Object.keys(S.done).length+'/'+LESSONS.length+' lessons done</div></div>'+
    '</div>'+
    '<div style="padding:12px 16px;background:'+BG+';border-bottom:1px solid '+BORDER+'">'+
      '<div style="font-size:11px;color:'+DIM+';margin-bottom:6px">Anthropic API Key — get one free at <a href="https://console.anthropic.com" target="_blank" style="color:'+GRN+'">console.anthropic.com</a></div>'+
      '<input id="api-key-inp" type="password" placeholder="sk-ant-api03-…" oninput="updateAiKey(this.value)" style="width:100%;background:'+P2+';border:1px solid '+BORDER+';border-radius:7px;padding:8px 12px;font-size:13px;font-family:'+MONO+'"/>'+
    '</div>'+
    '<div id="aiMsgs" style="padding:16px;max-height:360px;overflow-y:auto">'+msgs+loading+'</div>'+
  '</div>'+
  '<div style="margin-bottom:12px"><div style="font-size:11px;color:'+DIM+';font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Quick questions</div><div style="display:flex;flex-wrap:wrap;gap:7px">'+qBtns+'</div></div>'+

    '<button onclick="sendAI()" '+(S.aiLoad?'disabled':'')+' style="background:'+GRN+';color:#fff;border:none;border-radius:10px;padding:11px 24px;font-size:13px;font-weight:700;cursor:pointer;opacity:'+(S.aiLoad?.6:1)+'">Ask →</button>'+
